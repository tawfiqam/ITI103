<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ROT13 — Cipher Classroom</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=VT323&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green: #00ff88;
      --green-dim: #00cc66;
      --green-dark: #004422;
      --amber: #ffaa00;
      --red: #ff4444;
      --bg: #060e06;
      --bg2: #0a160a;
      --bg3: #0f200f;
      --border: #00ff8840;
      --text: #c8ffd8;
      --text-dim: #669977;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,255,136,0.015) 2px,
        rgba(0,255,136,0.015) 4px
      );
      pointer-events: none;
      z-index: 999;
    }
    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* Header */
    .header {
      text-align: center;
      padding: 24px 0 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .header-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 6px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .header-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 900;
      color: var(--green);
      text-shadow: 0 0 30px var(--green), 0 0 60px rgba(0,255,136,0.3);
      letter-spacing: 4px;
    }
    .header-sub {
      font-family: 'VT323', monospace;
      font-size: 22px;
      color: var(--text-dim);
      margin-top: 6px;
    }
    /* Slide navigation */
    .nav {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .nav-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      padding: 8px 18px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 1px;
    }
    .nav-btn:hover:not(:disabled) {
      background: var(--green-dark);
      border-color: var(--green);
      box-shadow: 0 0 12px rgba(0,255,136,0.3);
    }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .nav-dots {
      display: flex; gap: 8px; flex: 1; justify-content: center; flex-wrap: wrap;
    }
    .nav-dot {
      width: 10px; height: 10px;
      border: 1px solid var(--text-dim);
      background: transparent;
      cursor: pointer;
      transition: all 0.15s;
      padding: 0;
    }
    .nav-dot.active {
      background: var(--green);
      border-color: var(--green);
      box-shadow: 0 0 8px var(--green);
    }
    .slide-counter {
      font-family: 'VT323', monospace;
      font-size: 20px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    /* Slide */
    .slide {
      flex: 1;
      border: 1px solid var(--border);
      background: var(--bg2);
      padding: clamp(20px, 4vw, 40px);
      position: relative;
      animation: slideIn 0.3s ease;
    }
    .slide::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 3px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .slide-tag {
      font-size: 10px;
      letter-spacing: 5px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .slide-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(18px, 3.5vw, 28px);
      font-weight: 700;
      color: var(--green);
      margin-bottom: 24px;
      text-shadow: 0 0 15px rgba(0,255,136,0.4);
    }
    .slide-body { line-height: 1.8; color: var(--text); }

    /* Content blocks */
    .info-box {
      border-left: 3px solid var(--green);
      background: var(--bg3);
      padding: 14px 18px;
      margin: 16px 0;
      font-size: 15px;
    }
    .highlight { color: var(--green); font-weight: bold; }
    .amber { color: var(--amber); }
    .dim { color: var(--text-dim); }

    /* Alphabet wheel */
    .wheel-container {
      margin: 20px 0;
      overflow-x: auto;
    }
    .wheel-row {
      display: flex;
      gap: 4px;
      margin-bottom: 6px;
      min-width: max-content;
    }
    .wheel-cell {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border);
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      transition: all 0.2s;
      position: relative;
    }
    .wheel-cell.top { color: var(--green); background: var(--bg3); }
    .wheel-cell.bottom { color: var(--amber); background: #1a1000; border-color: #ffaa0040; }
    .wheel-cell.active-pair .top-inner { background: var(--green); color: var(--bg); }
    .wheel-row-label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 3px;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    /* Example table */
    .example-table { width: 100%; border-collapse: collapse; margin: 16px 0; }
    .example-table th {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    .example-table td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(0,255,136,0.08);
      font-size: 16px;
    }
    .example-table tr:hover td { background: var(--bg3); }
    .plain { color: var(--text); }
    .cipher { color: var(--green); }

    /* Mapping visual */
    .mapping {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      font-size: 18px;
      flex-wrap: wrap;
    }
    .mapping-letter {
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid;
      font-family: 'Share Tech Mono', monospace;
      font-size: 20px;
    }
    .mapping-plain { border-color: var(--text-dim); color: var(--text); }
    .mapping-cipher { border-color: var(--green); color: var(--green); background: var(--bg3); }
    .arrow { color: var(--text-dim); font-size: 20px; }

    /* Step-by-step */
    .steps { counter-reset: step; }
    .step {
      display: flex;
      gap: 16px;
      margin: 14px 0;
      align-items: flex-start;
    }
    .step-num {
      flex-shrink: 0;
      width: 28px; height: 28px;
      border: 1px solid var(--green);
      color: var(--green);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
    }
    .step-text { padding-top: 4px; line-height: 1.7; }

    /* Word transform */
    .word-transform {
      display: flex;
      gap: 2px;
      flex-wrap: wrap;
      margin: 12px 0;
    }
    .letter-block {
      text-align: center;
      min-width: 38px;
    }
    .lb-plain {
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 6px 4px;
      font-size: 20px;
      color: var(--text);
    }
    .lb-arrow {
      padding: 2px 0;
      font-size: 12px;
      color: var(--text-dim);
    }
    .lb-cipher {
      background: var(--green-dark);
      border: 1px solid var(--green);
      padding: 6px 4px;
      font-size: 20px;
      color: var(--green);
    }

    /* Self-inverse diagram */
    .self-inverse {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 16px 0;
    }
    .si-box {
      padding: 10px 20px;
      font-size: 18px;
    }
    .si-plain { border: 1px solid var(--text-dim); color: var(--text); }
    .si-enc { border: 1px solid var(--green); color: var(--green); background: var(--green-dark); }
    .si-back { border: 1px solid var(--amber); color: var(--amber); background: #1a1000; }
    .si-arr { color: var(--text-dim); font-size: 24px; }
    .si-label { font-size: 11px; color: var(--text-dim); text-align: center; margin-top: 4px; letter-spacing: 1px; }

    /* Uses list */
    .use-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      margin: 20px 0;
    }
    .use-card {
      border: 1px solid var(--border);
      background: var(--bg3);
      padding: 16px;
    }
    .use-icon { font-size: 24px; margin-bottom: 8px; }
    .use-title {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      color: var(--green);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .use-desc { font-size: 13px; color: var(--text-dim); line-height: 1.6; }

    /* LIVE DEMO */
    .demo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 20px;
    }
    @media (max-width: 600px) { .demo-grid { grid-template-columns: 1fr; } }
    .demo-panel {
      border: 1px solid var(--border);
      background: var(--bg3);
      padding: 16px;
    }
    .demo-panel-label {
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .demo-textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      padding: 12px;
      resize: vertical;
      min-height: 120px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.6;
    }
    .demo-textarea:focus { border-color: var(--green); box-shadow: 0 0 12px rgba(0,255,136,0.15); }
    .demo-output {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--green-dark);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      padding: 12px;
      min-height: 120px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .demo-char-map {
      margin-top: 16px;
      padding: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      font-size: 13px;
      max-height: 120px;
      overflow-y: auto;
    }
    .char-map-title {
      font-size: 10px; letter-spacing: 3px; color: var(--text-dim);
      text-transform: uppercase; margin-bottom: 8px;
    }
    .char-pair {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      margin: 2px 4px;
      font-size: 14px;
    }
    .cp-from { color: var(--text); }
    .cp-arrow { color: var(--text-dim); font-size: 10px; }
    .cp-to { color: var(--green); }

    .demo-info {
      margin-top: 12px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .demo-stat {
      font-size: 12px;
      color: var(--text-dim);
    }
    .demo-stat span { color: var(--amber); }

    .btn-clear {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      padding: 4px 12px;
      cursor: pointer;
      letter-spacing: 1px;
      margin-top: 8px;
    }
    .btn-clear:hover { border-color: var(--red); color: var(--red); }

    .btn-swap {
      background: var(--green-dark);
      border: 1px solid var(--green);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      padding: 8px 20px;
      cursor: pointer;
      letter-spacing: 2px;
      margin: 12px auto 0;
      display: block;
      transition: all 0.15s;
    }
    .btn-swap:hover { background: var(--green); color: var(--bg); }

    .demo-note {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-dim);
      border-left: 2px solid var(--green-dark);
      padding-left: 12px;
    }

    .badge {
      display: inline-block;
      background: var(--green-dark);
      border: 1px solid var(--green);
      color: var(--green);
      font-size: 11px;
      padding: 2px 8px;
      letter-spacing: 1px;
      margin: 2px;
    }
    .badge-amber {
      background: #1a1000;
      border-color: var(--amber);
      color: var(--amber);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--green-dark); }
    ::-webkit-scrollbar-thumb:hover { background: var(--green); }

    .footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 2px;
    }
    .blink { animation: blink 1.2s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function rot13(str) {
  return str.replace(/[a-zA-Z]/g, ch => {
    const base = ch >= 'a' ? 97 : 65;
    return String.fromCharCode(((ch.charCodeAt(0) - base + 13) % 26) + base);
  });
}

const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const ROT_ALPHABET = ALPHABET.map((_, i) => ALPHABET[(i + 13) % 26]);

function AlphabetWheel({ highlightFrom = null }) {
  return (
    <div className="wheel-container">
      <div className="wheel-row-label">Plain text &nbsp;&nbsp;→</div>
      <div className="wheel-row">
        {ALPHABET.map((ch, i) => {
          const active = highlightFrom && ch === highlightFrom.toUpperCase();
          return (
            <div key={ch} className="wheel-cell top" style={{
              background: active ? 'var(--green)' : 'var(--bg3)',
              color: active ? 'var(--bg)' : 'var(--green)',
              borderColor: active ? 'var(--green)' : 'var(--border)',
              boxShadow: active ? '0 0 12px var(--green)' : 'none',
            }}>
              {ch}
            </div>
          );
        })}
      </div>
      <div style={{display:'flex',gap:'4px',margin:'4px 0'}}>
        {ALPHABET.map((_, i) => (
          <div key={i} style={{width:'34px',textAlign:'center',fontSize:'9px',color:'var(--text-dim)'}}>
            {i+1}
          </div>
        ))}
      </div>
      <div className="wheel-row-label" style={{marginTop:'8px'}}>ROT13 &nbsp;&nbsp;&nbsp;&nbsp;→</div>
      <div className="wheel-row">
        {ROT_ALPHABET.map((ch, i) => {
          const active = highlightFrom && ALPHABET[i] === highlightFrom.toUpperCase();
          return (
            <div key={i} className="wheel-cell bottom" style={{
              background: active ? 'var(--amber)' : '#1a1000',
              color: active ? 'var(--bg)' : 'var(--amber)',
              borderColor: active ? 'var(--amber)' : '#ffaa0040',
              boxShadow: active ? '0 0 12px var(--amber)' : 'none',
            }}>
              {ch}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function WordTransform({ word }) {
  const upper = word.toUpperCase();
  return (
    <div className="word-transform">
      {upper.split('').map((ch, i) => {
        const enc = rot13(ch);
        const isAlpha = /[A-Z]/.test(ch);
        return (
          <div key={i} className="letter-block">
            <div className="lb-plain">{ch}</div>
            <div className="lb-arrow">↓</div>
            <div className="lb-cipher" style={isAlpha ? {} : {background:'var(--bg3)',borderColor:'var(--border)',color:'var(--text-dim)'}}>
              {enc}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// Slide 3 — needs useState, must be a proper component
function SlideLetterExamples() {
  const [hover, setHover] = useState(null);
  const examples = [
    { plain:'A', pos:1,  enc:'N', newPos:14 },
    { plain:'E', pos:5,  enc:'R', newPos:18 },
    { plain:'H', pos:8,  enc:'U', newPos:21 },
    { plain:'M', pos:13, enc:'Z', newPos:26 },
    { plain:'N', pos:14, enc:'A', newPos:1  },
    { plain:'Z', pos:26, enc:'M', newPos:13 },
  ];
  return (
    <div className="slide-body">
      <p style={{marginBottom:'16px',color:'var(--text-dim)'}}>
        Hover a row to highlight its position on the wheel below.
      </p>
      <table className="example-table">
        <thead>
          <tr>
            <th>Plain Letter</th>
            <th>Position</th>
            <th>+13</th>
            <th>ROT13 Letter</th>
          </tr>
        </thead>
        <tbody>
          {examples.map(ex => (
            <tr key={ex.plain}
              onMouseEnter={() => setHover(ex.plain)}
              onMouseLeave={() => setHover(null)}
              style={{cursor:'default'}}>
              <td className="plain" style={{fontSize:'22px',fontFamily:'VT323',letterSpacing:'2px'}}>{ex.plain}</td>
              <td className="dim">{ex.pos}</td>
              <td className="dim">{ex.pos} + 13 = {ex.newPos > 26 ? `${ex.pos}+13-26 = ${ex.newPos-26}` : ex.newPos}</td>
              <td className="cipher" style={{fontSize:'22px',fontFamily:'VT323',letterSpacing:'2px'}}>{ex.enc}</td>
            </tr>
          ))}
        </tbody>
      </table>
      <AlphabetWheel highlightFrom={hover} />
    </div>
  );
}

// Slide 7 — needs useState, must be a proper component
function SlidePlayground() {
  const [input, setInput] = useState('Hello, World!');
  const output = rot13(input);
  const charPairs = [];
  const seen = new Set();
  for (const ch of input) {
    if (/[a-zA-Z]/.test(ch) && !seen.has(ch.toUpperCase())) {
      seen.add(ch.toUpperCase());
      charPairs.push({ from: ch.toUpperCase(), to: rot13(ch).toUpperCase() });
    }
  }
  return (
    <div className="slide-body">
      <p style={{color:'var(--text-dim)',marginBottom:'16px'}}>
        Type any text below. ROT13 is applied in real-time. Notice how encoding and decoding are the same operation!
      </p>
      <div className="demo-grid">
        <div className="demo-panel">
          <div className="demo-panel-label">▶ Input — type here</div>
          <textarea
            className="demo-textarea"
            value={input}
            onChange={e => setInput(e.target.value)}
            placeholder="Type your message..."
            spellCheck={false}
          />
          <button className="btn-clear" onClick={() => setInput('')}>[ CLEAR ]</button>
          <div className="demo-info">
            <div className="demo-stat">Characters: <span>{input.length}</span></div>
            <div className="demo-stat">Letters: <span>{input.replace(/[^a-zA-Z]/g,'').length}</span></div>
          </div>
        </div>
        <div className="demo-panel">
          <div className="demo-panel-label">◀ Output — ROT13 result</div>
          <div className="demo-output">{output || <span style={{color:'var(--text-dim)'}}>Output will appear here...</span>}</div>
          <button className="btn-clear" onClick={() => setInput(output)}>[ USE AS INPUT ]</button>
        </div>
      </div>
      {charPairs.length > 0 && (
        <div className="demo-char-map">
          <div className="char-map-title">Character map for this input</div>
          {charPairs.map(p => (
            <span key={p.from} className="char-pair">
              <span className="cp-from">{p.from}</span>
              <span className="cp-arrow">→</span>
              <span className="cp-to">{p.to}</span>
            </span>
          ))}
        </div>
      )}
      <button className="btn-swap" onClick={() => setInput(output)}>
        ⟳ SWAP — Apply ROT13 Again (Decode)
      </button>
      <div className="demo-note" style={{marginTop:'16px'}}>
        💡 <strong style={{color:'var(--text)'}}>Tip:</strong> Encode a secret message, share it with a friend, and have them paste it back in — they'll get the original text back automatically!
      </div>
    </div>
  );
}

const SLIDES = [
  {
    tag: '01 / Introduction',
    title: 'What is ROT13?',
    Component: () => (
      <div className="slide-body">
        <div className="info-box">
          <span className="highlight">ROT13</span> ("rotate by 13") is a simple letter substitution cipher that replaces each letter with the letter <span className="highlight">13 positions</span> ahead in the alphabet.
        </div>
        <div className="steps">
          <div className="step">
            <div className="step-num">1</div>
            <div className="step-text">Take any letter in the English alphabet (A–Z).</div>
          </div>
          <div className="step">
            <div className="step-num">2</div>
            <div className="step-text">Count <span className="highlight">13 places forward</span> (wrapping around from Z back to A).</div>
          </div>
          <div className="step">
            <div className="step-num">3</div>
            <div className="step-text">The new letter is your <span className="amber">ciphertext</span> character.</div>
          </div>
          <div className="step">
            <div className="step-num">4</div>
            <div className="step-text">Non-letters (numbers, spaces, punctuation) are <span className="dim">left unchanged</span>.</div>
          </div>
        </div>
        <div className="info-box" style={{marginTop:'20px',borderColor:'var(--amber)'}}>
          <span style={{color:'var(--amber)'}}>⚡ Key fact:</span> Because the alphabet has 26 letters and we rotate by exactly half (13), applying ROT13 <strong style={{color:'var(--text)'}}>twice</strong> returns the original text. It is its own inverse!
        </div>
      </div>
    )
  },
  {
    tag: '02 / The Alphabet Wheel',
    title: 'The ROT13 Mapping Table',
    Component: () => (
      <div className="slide-body">
        <p style={{marginBottom:'16px', color:'var(--text-dim)'}}>Each letter in the <span className="highlight">top row (green)</span> maps to the letter directly below it in the <span className="amber">bottom row (amber)</span>. The two rows are offset by exactly 13.</p>
        <AlphabetWheel />
        <div style={{display:'flex',gap:'20px',marginTop:'20px',flexWrap:'wrap'}}>
          <div className="info-box" style={{flex:'1',minWidth:'180px'}}>
            <div style={{marginBottom:'6px'}}><span className="highlight">First half maps to second:</span></div>
            <span className="badge">A→N</span> <span className="badge">B→O</span> <span className="badge">C→P</span> <span className="badge">... M→Z</span>
          </div>
          <div className="info-box" style={{flex:'1',minWidth:'180px',borderColor:'var(--amber)'}}>
            <div style={{marginBottom:'6px'}}><span className="amber">Second half maps to first:</span></div>
            <span className="badge badge-amber">N→A</span> <span className="badge badge-amber">O→B</span> <span className="badge badge-amber">P→C</span> <span className="badge badge-amber">... Z→M</span>
          </div>
        </div>
      </div>
    )
  },
  {
    tag: '03 / Letter Examples',
    title: 'Letter-by-Letter Examples',
    Component: SlideLetterExamples
  },
  {
    tag: '04 / Word Examples',
    title: 'Encoding Full Words',
    Component: () => {
      const words = ['HELLO', 'SECRET', 'CIPHER'];
      return (
        <div className="slide-body">
          <p style={{marginBottom:'20px',color:'var(--text-dim)'}}>Each letter is independently shifted by 13. Spaces and punctuation pass through unchanged.</p>
          {words.map(w => (
            <div key={w} style={{marginBottom:'24px'}}>
              <div style={{display:'flex',gap:'10px',alignItems:'center',marginBottom:'8px'}}>
                <span className="badge" style={{fontSize:'14px',padding:'4px 12px'}}>{w}</span>
                <span className="arrow" style={{fontSize:'18px'}}>→</span>
                <span className="badge badge-amber" style={{fontSize:'14px',padding:'4px 12px'}}>{rot13(w)}</span>
              </div>
              <WordTransform word={w} />
            </div>
          ))}
        </div>
      );
    }
  },
  {
    tag: '05 / Self-Inverse Property',
    title: 'ROT13 Undoes Itself',
    Component: () => (
      <div className="slide-body">
        <div className="info-box">
          <span className="highlight">Key property:</span> Applying ROT13 twice always returns the original text. This is because 13 + 13 = 26, which is exactly one full rotation of the alphabet.
        </div>
        <div style={{marginTop:'24px'}}>
          <div className="step">
            <div className="step-num">→</div>
            <div className="step-text">
              Start with: <span className="highlight" style={{fontSize:'18px'}}>HELLO</span>
            </div>
          </div>
          <div style={{margin:'16px 0'}}>
            <div className="self-inverse">
              <div>
                <div className="si-box si-plain">HELLO</div>
                <div className="si-label">PLAIN TEXT</div>
              </div>
              <div className="si-arr">→</div>
              <div>
                <div className="si-box si-enc">URYYB</div>
                <div className="si-label">APPLY ROT13</div>
              </div>
              <div className="si-arr">→</div>
              <div>
                <div className="si-box si-back">HELLO</div>
                <div className="si-label">APPLY ROT13 AGAIN</div>
              </div>
            </div>
          </div>
          <div className="step">
            <div className="step-num">→</div>
            <div className="step-text">
              The same function is used for <span className="highlight">both encoding and decoding</span>. There is no separate decrypt step!
            </div>
          </div>
        </div>
        <div className="info-box" style={{borderColor:'var(--amber)',marginTop:'20px'}}>
          <span className="amber">Mathematical reason:</span> ROT13 is a Caesar cipher with shift = 13. Since 2 × 13 ≡ 0 (mod 26), two applications cancel out perfectly.
        </div>
      </div>

  },
  {
    tag: '06 / Real-World Uses',
    title: 'Where ROT13 is Used',
    Component: () => (
      <div className="slide-body">

            <div className="use-title">Spoiler Hiding</div>
            <div className="use-desc">Online forums like Usenet and Reddit historically used ROT13 to hide spoilers so readers could choose to decode them.</div>
          </div>
          <div className="use-card">
            <div className="use-icon">🎮</div>
            <div className="use-title">Puzzle & Game Design</div>
            <div className="use-desc">Game designers embed ROT13-encoded hints in documentation to hide solutions without making them inaccessible.</div>

          <div className="use-card">

          <div className="use-card">
            <div className="use-icon">📚</div>

          <span style={{color:'var(--red)'}}>⚠️ Security Warning:</span> ROT13 provides <strong>zero</strong> real cryptographic security. Anyone who knows it is ROT13 can decode it instantly. It is obfuscation, not encryption.
        </div>
      </div>
    )
  },
  {
    tag: '07 / Try It Yourself',
    title: 'Live ROT13 Playground',
    Component: SlidePlayground
  }

function App() {
  const [slide, setSlide] = useState(0);

  const goTo = (i) => {
    if (i >= 0 && i < SLIDES.length) setSlide(i);
  };

  const s = SLIDES[slide];

  return (
    <div className="app">
      <div className="header">
        <div className="header-label">Cryptography 101</div>
        <div className="header-title">ROT13</div>
        <div className="header-sub">The Caesar Cipher, Rotated by 13<span className="blink">_</span></div>
      </div>

      <div className="nav">
        <button className="nav-btn" onClick={() => goTo(slide - 1)} disabled={slide === 0}>
          ◀ PREV
        </button>
        <div className="nav-dots">
          {SLIDES.map((_, i) => (
            <button key={i} className={`nav-dot ${i === slide ? 'active' : ''}`} onClick={() => goTo(i)} />
          ))}
        </div>
        <span className="slide-counter">{slide + 1} / {SLIDES.length}</span>
        <button className="nav-btn" onClick={() => goTo(slide + 1)} disabled={slide === SLIDES.length - 1}>
          NEXT ▶
        </button>
      </div>

      <div className="slide" key={slide}>
        <div className="slide-tag">{s.tag}</div>
        <div className="slide-title">{s.title}</div>
        <s.Component />
      </div>

      <div className="footer">
        ROT13 CIPHER CLASSROOM &nbsp;·&nbsp; CRYPTOGRAPHY FUNDAMENTALS &nbsp;·&nbsp; <span className="blink">■</span>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
