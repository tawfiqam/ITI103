/* ── ROT13 ── */
function rot13(str) {
  return str.replace(/[a-zA-Z]/g, c => {
    const base = c <= 'Z' ? 65 : 97;
    return String.fromCharCode(((c.charCodeAt(0) - base + 13) % 26) + base);
  });
}

/* ── Caesar cipher ── */
function caesar(str, shift, decode = false) {
  const s = decode ? (26 - shift) % 26 : shift;
  return str.replace(/[a-zA-Z]/g, c => {
    const base = c <= 'Z' ? 65 : 97;
    return String.fromCharCode(((c.charCodeAt(0) - base + s) % 26) + base);
  });
}

/* ── Keyword cipher ── */
function buildKeywordAlphabet(keyword) {
  const seen = new Set();
  const clean = keyword.toUpperCase().replace(/[^A-Z]/g, '');
  let result = '';
  for (const c of clean) { if (!seen.has(c)) { seen.add(c); result += c; } }
  for (let i = 0; i < 26; i++) {
    const c = String.fromCharCode(65 + i);
    if (!seen.has(c)) { seen.add(c); result += c; }
  }
  return result;
}
function keywordCipher(str, keyword, decode = false) {
  const alpha = buildKeywordAlphabet(keyword);
  return str.replace(/[a-zA-Z]/g, c => {
    const upper = c.toUpperCase();
    if (decode) {
      const idx = alpha.indexOf(upper);
      const enc = String.fromCharCode(65 + idx);
      return c === upper ? enc : enc.toLowerCase();
    } else {
      const idx = upper.charCodeAt(0) - 65;
      const enc = alpha[idx];
      return c === upper ? enc : enc.toLowerCase();
    }
  });
}

                </span>
              </div>
            )}
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

  const rot13Alpha = 'NOPQRSTUVWXYZABCDEFGHIJKLM'.split('');
  const caesarAlpha = Array.from({length:26},(_,i) => String.fromCharCode(65+((i+caesarShift)%26)));
  const kwAlpha = buildKeywordAlphabet(kwKey).split('');

  // highlight letters used in input
  const getHighlight = (text) => [...new Set(text.toUpperCase().replace(/[^A-Z]/g,'').split(''))];

  const rot13Result = rot13(rot13Input);
  const caesarResult = caesar(caesarInput, caesarShift, caesarDecode);
  const kwResult = keywordCipher(kwInput, kwKey, kwDecode);

  return (
    <>
      {/* HERO */}
      <section id="hero" style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center', textAlign: 'center', position: 'relative', overflow: 'hidden' }}>
        <div className="hero-grid" />
        <div className="container fade-up" style={{ position: 'relative', zIndex: 1 }}>
          <h1>Six Degrees<br/><span>&</span> Encryption</h1>
          <p>Exploring social networks, connectedness, and the art of keeping secrets — from Hollywood to cryptography.</p>
          <div className="hero-chips">
            <span className="chip">Six Degrees of Kevin Bacon</span>
            <span className="chip">Samuel L. Jackson</span>
            <span className="chip">Social Networks</span>
            <span className="chip">ROT13 · Caesar · Keyword</span>
            <span className="chip">Dunbar's Number</span>
          </div>
        </div>
      </section>

      {/* KEVIN BACON */}
      <section id="bacon">
        <div className="container">
          <div className="sec-header">
            <span className="sec-num">01</span>
            <div>
              <div className="sec-title">Six Degrees of Kevin Bacon</div>
              <div className="sec-subtitle">Every actor in Hollywood can be linked to Kevin Bacon in 6 steps or fewer</div>
            </div>
          </div>

          <div className="concept-grid" style={{ marginBottom: '2rem' }}>
            <div className="concept-card">
              <div className="icon">🕸️</div>
              <h4>The Theory</h4>
              <p>Six Degrees of Separation suggests any two people on Earth are connected through at most 6 acquaintances. The Bacon Number applies this to film co-stars.</p>
            </div>
            <div className="concept-card">
              <div className="icon">🎬</div>
              <h4>Kevin Bacon</h4>
              <p>Chosen as the "center of the Hollywood universe" due to his prolific career spanning diverse genres and studios since the 1970s.</p>
            </div>
            <div className="concept-card">
              <div className="icon">🔢</div>
              <h4>Bacon Number</h4>
              <p>Kevin Bacon himself has a Bacon Number of 0. Actors who appeared with him directly have a Bacon Number of 1, and so on.</p>
            </div>
          </div>

          <div className="card">
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: '1rem', marginBottom: '1.2rem' }}>
              <h3>Interactive Bacon Number Chains</h3>
              <div className="degree-badge">
                🥓 Bacon Number: <strong style={{ color: 'var(--gold)', marginLeft: '.3rem' }}>{baconChains[baconIdx].degrees}</strong>
              </div>
            </div>

            <div className="tabs">
              {baconChains.map((b, i) => (
                <button key={i} className={`tab ${baconIdx === i ? 'active' : ''}`}
                  onClick={() => setBaconIdx(i)}>
                  {b.person}
                </button>
              ))}
            </div>

            <DegreeChain chain={baconChains[baconIdx].chain} targetColor="#f0c040" />

            <div style={{ marginTop: '1rem', fontSize: '.85rem', color: 'var(--muted)' }}>
              {baconChains[baconIdx].chain.map((n, i) => n.film && (
                <span key={i} style={{ marginRight: '1.5rem' }}>
                  <span style={{ color: 'var(--amber)' }}>Step {i}:</span> {n.film}
                </span>
              ))}
            </div>
          </div>
        </div>
      </section>

      <div className="container"><div className="divider"/></div>

      {/* SAMUEL JACKSON */}
      <section id="jackson" style={{ paddingTop: '40px' }}>
        <div className="container">
          <div className="sec-header">
            <span className="sec-num">02</span>
            <div>
              <div className="sec-title">Why is Samuel L. Jackson<br/>the Center of the Universe?</div>
              <div className="sec-subtitle">Week 08 · Quantifying Connectedness</div>
            </div>
          </div>

          <div className="concept-grid" style={{ marginBottom: '2rem' }}>
            <div className="concept-card">
              <div className="icon">👑</div>
              <h4>Most Connected Actor</h4>
              <p>Samuel L. Jackson appears in more films than nearly any major Hollywood star — his network of co-stars is exceptionally large and diverse.</p>
            </div>
            <div className="concept-card">
              <div className="icon">🎥</div>
              <h4>Genre Breadth</h4>
              <p>From action blockbusters to indie dramas, animation to horror, Jackson spans every genre — maximizing the chance of a short connection to any actor.</p>
            </div>
            <div className="concept-card">
              <div className="icon">🧮</div>
              <h4>Jackson Number</h4>
              <p>Like Bacon Number, a "Jackson Number" measures how many films separate any actor from Samuel L. Jackson. Most Hollywood actors score a 2 or less.</p>
            </div>
          </div>

          <div className="card" style={{ marginBottom: '1.5rem' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: '1rem', marginBottom: '1.2rem' }}>
              <h3>Interactive Jackson Number Chains</h3>
              <div className="degree-badge" style={{ borderColor: 'var(--teal)', color: 'var(--teal)' }}>
                🎬 Jackson Number: <strong style={{ color: 'var(--teal)', marginLeft: '.3rem' }}>{jacksonChains[jacksonIdx].degrees}</strong>
              </div>
            </div>

            <div className="tabs">
              {jacksonChains.map((j, i) => (
                <button key={i} className={`tab ${jacksonIdx === i ? 'active' : ''}`}
                  onClick={() => setJacksonIdx(i)}>
                  {j.person}
                </button>
              ))}
            </div>

            <DegreeChain chain={jacksonChains[jacksonIdx].chain} targetColor="#1de9b6" />

            <div style={{ marginTop: '1rem', fontSize: '.85rem', color: 'var(--muted)' }}>
              {jacksonChains[jacksonIdx].chain.map((n, i) => n.film && (
                <span key={i} style={{ marginRight: '1.5rem' }}>
                  <span style={{ color: 'var(--amber)' }}>Step {i}:</span> {n.film}
                </span>
              ))}
            </div>
          </div>

          {/* Dunbar's Number */}
          <div className="card">
            <h3>Dunbar's Number & Social Networks</h3>
            <p style={{ fontSize: '.9rem', color: 'var(--muted)', marginBottom: '1rem', lineHeight: 1.7 }}>
              Robin Dunbar proposed that humans can maintain stable social relationships with roughly <strong style={{ color: 'var(--gold)' }}>150 people</strong> at once.
              This is the "cognitive limit" imposed by the size of our neocortex. Six Degrees theory shows that even with this constraint, the world is surprisingly small.
            </p>
            <div className="dunbar-row">
              {[
                { n: '5', label: 'Intimate', bg: 'rgba(255,64,96,.15)', border: 'var(--red)' },
                { n: '15', label: 'Close Friends', bg: 'rgba(232,144,42,.15)', border: 'var(--amber)' },
                { n: '50', label: 'Good Friends', bg: 'rgba(240,192,64,.12)', border: 'var(--gold)' },
                { n: '150', label: "Dunbar's Limit", bg: 'rgba(29,233,182,.12)', border: 'var(--teal)' },
                { n: '500', label: 'Acquaintances', bg: 'rgba(100,100,180,.12)', border: '#6464b4' },
              ].map(d => (
                <div key={d.n} className="dunbar-ring" style={{ background: d.bg, border: `2px solid ${d.border}`, color: d.border }}>
                  <span className="dn">{d.n}</span>
                  <span className="dl">{d.label}</span>
                </div>
              ))}
            </div>
            <p style={{ fontSize: '.82rem', color: 'var(--muted)', marginTop: '1rem', lineHeight: 1.7 }}>
              Relation to IT & Informatics: Social network platforms exploit and exceed these limits — your Instagram "friends" may number in thousands, but real influence still clusters around Dunbar rings. Graph theory and network centrality metrics quantify who the true "hubs" (like Samuel L. Jackson) are in any network.
            </p>
          </div>
        </div>
      </section>

      <div className="container"><div className="divider"/></div>

      {/* NETWORKS */}
      <section id="networks" style={{ paddingTop: '40px' }}>
        <div className="container">
          <div className="sec-header">
            <span className="sec-num">03</span>
            <div>
              <div className="sec-title">Social Networks & Data Science</div>
              <div className="sec-subtitle">Real networks vs. platforms · Centrality · Connectedness</div>
            </div>
          </div>

          <div className="concept-grid">
            {[
              { icon: '🏫', title: 'Real Social Networks', body: 'Friends, coworkers, classmates, community members, family. These are authentic ties — not follower counts on platforms.' },
              { icon: '📊', title: 'Network Centrality', body: 'A node (person) is "central" if many shortest paths between other nodes pass through them. Samuel L. Jackson is highly central in Hollywood\'s film network.' },
              { icon: '🍽️', title: 'Lunch Table Research', body: 'The "High School Popularity Project" measures social clustering by tracking who sits with whom at lunch — a real-world graph data collection method.' },
              { icon: '🌐', title: 'Internet Topology', body: 'Internet traffic also forms a network. Understanding centrality helps identify bottlenecks, vulnerabilities, and key routing nodes — directly connecting to cybersecurity.' },
              { icon: '🔗', title: 'Small World Effect', body: 'Despite billions of people, short paths exist everywhere due to "bridge" nodes. This is why misinformation spreads so fast and why contact tracing works.' },
              { icon: '🧠', title: 'Why This Matters in IT', body: 'Graph algorithms power recommendation systems, fraud detection, routing protocols, and social media feeds. Six Degrees isn\'t just trivia — it\'s the foundation of network science.' },
            ].map((c, i) => (
              <div className="concept-card" key={i}>
                <div className="icon">{c.icon}</div>
                <h4>{c.title}</h4>
                <p>{c.body}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      <div className="container"><div className="divider"/></div>

      {/* ENCRYPTION */}
      <section id="encryption" style={{ paddingTop: '40px' }}>
        <div className="container">
          <div className="sec-header">
            <span className="sec-num">04</span>
            <div>
              <div className="sec-title">Encryption</div>
              <div className="sec-subtitle">Week 09 · Substitution Ciphers · From "ATTACK AT DAWN" to the AES standard</div>
            </div>
          </div>

          {/* Why secure? */}
          <div className="card" style={{ marginBottom: '1.5rem', background: 'linear-gradient(135deg, #12121a, #0d1520)' }}>
            <h3>Why do we secure our traffic?</h3>
            <div className="concept-grid" style={{ marginTop: '0' }}>
              {[
                { icon: '🔒', title: 'Confidentiality', body: 'Ensure that only the intended recipient can read the message. Encryption is the primary tool.' },
                { icon: '🛡️', title: 'Integrity', body: 'Confirm the message was not altered in transit. Checksums and hashing serve this goal.' },
                { icon: '✅', title: 'Availability', body: 'Ensure systems remain accessible to authorized users — part of the CIA Triad.' },
                { icon: '⚖️', title: 'Commensurate Risk', body: 'Security controls should match the level of risk. NIST guidelines formalize this principle.' },
              ].map((c, i) => (
                <div className="concept-card" key={i} style={{ padding: '1rem' }}>
                  <div className="icon">{c.icon}</div>
                  <h4>{c.title}</h4>
                  <p>{c.body}</p>
                </div>
              ))}
            </div>
          </div>

          {/* CIPHER TABS */}
          <div className="card">
            <h3>Interactive Cipher Playground</h3>
            <p style={{ fontSize: '.85rem', color: 'var(--muted)', marginBottom: '1.2rem' }}>
              Substitution ciphers are educational tools — they demonstrate cryptographic concepts but provide <strong style={{ color: 'var(--red)' }}>no real-world security</strong>.
            </p>

            <div className="tabs">
              {[['rot13','ROT13'],['caesar','Caesar Cipher'],['keyword','Keyword Cipher']].map(([id, label]) => (
                <button key={id} className={`tab ${cipherTab===id?'active':''}`} onClick={() => setCipherTab(id)}>{label}</button>
              ))}
            </div>

            {/* ROT13 */}
            {cipherTab === 'rot13' && (
              <div className="cipher-section fade-up">
                <div style={{ fontSize: '.9rem', color: 'var(--muted)', lineHeight: 1.7 }}>
                  <strong style={{ color: 'var(--gold)' }}>ROT13</strong> rotates each letter by 13 positions. Because the alphabet has 26 letters, applying ROT13 twice returns the original text — the same function encrypts and decrypts.
                </div>
                <div className="cipher-row">
                  <div>
                    <div className="cipher-label">Plaintext Input</div>
                    <textarea className="cipher-input" rows={3} value={rot13Input}
                      onChange={e => setRot13Input(e.target.value)} placeholder="Type something..." />
                  </div>
                  <div>
                    <div className="cipher-label">ROT13 Output <span className="info-tag">symmetric</span></div>
                    <div className="cipher-output">{rot13Result || <span style={{ color: 'var(--muted)' }}>…</span>}</div>
                    <div style={{ marginTop: '.5rem', fontSize: '.78rem', color: 'var(--muted)' }}>
                      Apply again to decode: <span style={{ color: 'var(--teal)', fontFamily: 'DM Mono, monospace' }}>{rot13(rot13Result)}</span>
                    </div>
                  </div>
                </div>
                <AlphaTable
                  plainRow={'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('')}
                  cipherRow={rot13Alpha}
                  highlight={getHighlight(rot13Input)}
                />
                <div style={{ fontSize: '.78rem', color: 'var(--muted)', marginTop: '.5rem' }}>
                  ↑ Highlighted letters appear in your input. Teal row shows each letter's ROT13 substitution.
                </div>
              </div>
            )}

            {/* Caesar */}
            {cipherTab === 'caesar' && (
              <div className="cipher-section fade-up">
                <div style={{ fontSize: '.9rem', color: 'var(--muted)', lineHeight: 1.7 }}>
                  <strong style={{ color: 'var(--gold)' }}>Caesar Cipher</strong> shifts every letter by a fixed amount (the key). Julius Caesar used a shift of 3. ROT13 is a Caesar cipher with shift = 13.
                </div>
                <div className="key-row">
                  <span className="key-label">Shift Key (ROT)</span>
                  <input type="range" className="key-slider" min="1" max="25" value={caesarShift}
                    onChange={e => setCaesarShift(Number(e.target.value))} />
                  <span className="key-val">{caesarShift}</span>
                  <button className={`btn ${caesarDecode ? 'teal' : ''}`}
                    onClick={() => setCaesarDecode(d => !d)}>
                    {caesarDecode ? '🔓 Decoding' : '🔐 Encoding'}
                  </button>
                </div>
                <div className="cipher-row">
                  <div>
                    <div className="cipher-label">{caesarDecode ? 'Ciphertext Input' : 'Plaintext Input'}</div>
                    <textarea className="cipher-input" rows={3} value={caesarInput}
                      onChange={e => setCaesarInput(e.target.value)} placeholder="Type something..." />
                  </div>
                  <div>
                    <div className="cipher-label">{caesarDecode ? 'Decoded Output' : 'Encoded Output'}</div>
                    <div className="cipher-output">{caesarResult || <span style={{ color: 'var(--muted)' }}>…</span>}</div>
                    <div style={{ marginTop: '.5rem', fontSize: '.78rem', color: 'var(--muted)' }}>
                      Shift: {caesarShift} · {caesarDecode ? `Reverse shift: ${(26-caesarShift)%26}` : `Decode with shift: ${(26-caesarShift)%26}`}
                    </div>
                  </div>
                </div>
                <AlphaTable
                  plainRow={'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('')}
                  cipherRow={caesarAlpha}
                  highlight={getHighlight(caesarInput)}
                />
                <div style={{ fontSize: '.78rem', color: 'var(--muted)', marginTop: '.5rem' }}>
                  ↑ Each plain letter maps to the letter {caesarShift} position(s) ahead in the alphabet.
                </div>
              </div>
            )}

            {/* Keyword */}
            {cipherTab === 'keyword' && (
              <div className="cipher-section fade-up">
                <div style={{ fontSize: '.9rem', color: 'var(--muted)', lineHeight: 1.7 }}>
                  <strong style={{ color: 'var(--gold)' }}>Keyword Cipher</strong> — type a secret keyword. The cipher alphabet is built by writing the keyword (no repeated letters) followed by the remaining letters of the alphabet. The key makes the cipher harder to crack.
                </div>
                <div className="key-row">
                  <span className="key-label">Secret Key</span>
                  <input className="keyword-input" value={kwKey}
                    onChange={e => setKwKey(e.target.value.replace(/[^a-zA-Z]/g,'').toUpperCase().slice(0,12))}
                    maxLength={12} placeholder="KEYWORD" />
                  <button className={`btn ${kwDecode ? 'teal' : ''}`}
                    onClick={() => setKwDecode(d => !d)}>
                    {kwDecode ? '🔓 Decoding' : '🔐 Encoding'}
                  </button>
                </div>
                <div className="cipher-row">
                  <div>
                    <div className="cipher-label">{kwDecode ? 'Ciphertext Input' : 'Plaintext Input'}</div>
                    <textarea className="cipher-input" rows={3} value={kwInput}
                      onChange={e => setKwInput(e.target.value)} placeholder="Type something..." />
                  </div>
                  <div>
                    <div className="cipher-label">{kwDecode ? 'Decoded Output' : 'Encoded Output'}</div>
                    <div className="cipher-output">{kwResult || <span style={{ color: 'var(--muted)' }}>…</span>}</div>
                    <div style={{ marginTop: '.5rem', fontSize: '.78rem', color: 'var(--muted)' }}>
                      Keyword: <span style={{ color: 'var(--gold)', fontFamily: 'DM Mono, monospace' }}>{kwKey || 'none'}</span>
                    </div>
                  </div>
                </div>
                <AlphaTable
                  plainRow={'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('')}
                  cipherRow={kwAlpha}
                  highlight={getHighlight(kwInput)}
                />
                <div style={{ fontSize: '.78rem', color: 'var(--muted)', marginTop: '.5rem' }}>
                  ↑ Cipher alphabet derived from keyword "<span style={{ color: 'var(--gold)' }}>{kwKey}</span>". Change the key above to see the mapping shift.
                </div>
              </div>
            )}
          </div>

          {/* Real encryption note */}
          <div className="card" style={{ marginTop: '1.5rem', borderColor: 'rgba(255,64,96,.3)', background: 'rgba(255,64,96,.05)' }}>
            <h3 style={{ color: 'var(--red)' }}>Substitution Ciphers Are Not Safe!</h3>
            <div className="cipher-row" style={{ marginTop: '.5rem' }}>
              <div>
                <div style={{ fontSize: '.9rem', color: 'var(--muted)', lineHeight: 1.75 }}>
                  <strong style={{ color: 'var(--white)' }}>Why simple ciphers fail:</strong><br/>
                  Letter frequency analysis easily breaks substitution ciphers. In English, 'E' appears ~13% of the time. An attacker counts letter frequencies in the ciphertext, maps the most common cipher-letter to 'E', and quickly unravels the message — even without knowing the key.
                </div>
              </div>
              <div>
                <div style={{ fontSize: '.9rem', color: 'var(--muted)', lineHeight: 1.75 }}>
                  <strong style={{ color: 'var(--white)' }}>Real-world encryption (AES-128):</strong><br/>
                  Uses mathematical operations on 128-bit blocks of data, 10 rounds of SubBytes, ShiftRows, MixColumns, and AddRoundKey transformations. Brute-forcing AES-128 would take longer than the age of the universe on current hardware. It protects the CIA Triad's <em>Confidentiality</em> component.
                </div>
              </div>
            </div>
          </div>

        </div>
      </section>

      {/* Footer */}
      <footer style={{ padding: '2.5rem 2rem', textAlign: 'center', borderTop: '1px solid var(--border)', marginTop: '3rem' }}>
        <div style={{ fontFamily: 'Bebas Neue, cursive', fontSize: '1.1rem', color: 'var(--muted)', letterSpacing: '.12em' }}>
          Week 08 &amp; 09 · Six Degrees of Separation · Encryption &amp; Cryptography
        </div>
        <div style={{ fontSize: '.75rem', color: 'var(--border)', marginTop: '.4rem' }}>
          Interactive educational presentation · CS Concepts
        </div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

/* ── NAV highlight on scroll ── */
const navLinks = document.querySelectorAll('nav a[href^="#"]');
const sections = ['hero','bacon','jackson','networks','encryption'];
window.addEventListener('scroll', () => {
  const pos = window.scrollY + 80;
  let current = 'hero';
  sections.forEach(id => {
    const el = document.getElementById(id);
    if (el && el.offsetTop <= pos) current = id;
  });
  navLinks.forEach(a => {
    a.classList.toggle('active', a.getAttribute('href') === '#' + current);
  });
});
</script>
